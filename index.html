<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>短视频平台创作者中心导航</title>

<link rel="stylesheet" href="/assets/css/main.css">

<link rel="stylesheet" href="https://cdn.anssl.cn/bootstrap/css/bootstrap.min.css">

<link rel="stylesheet" href="https://cdn.anssl.cn/bootstrap-icons/font/bootstrap-icons.min.css">

<style>

#member{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:2rem;
}

.box{
cursor:pointer;
padding:1rem;
border-radius:.5rem;
border:1px solid #dee2e6;
transition:.15s;
}

.box:hover{
transform:translateY(-2px);
}

.box.active{
background:#198754;
color:#fff;
}

.box.active a{
color:#fff;
}

.box img{
height:3rem;
}

</style>

</head>


<body>


<div class="container py-5">


<h3 class="text-center mb-5">短视频平台创作者中心导航</h3>


<div id="member"></div>



<div class="text-center pt-5 mb-3">


<span class="lead px-2">键盘</span>


<div class="d-inline-flex flex-column align-items-center mx-2">

<div>
<kbd><i class="bi bi-arrow-up"></i></kbd>
</div>

<div class="pt-1">
<kbd><i class="bi bi-arrow-left"></i></kbd>
<kbd><i class="bi bi-arrow-down"></i></kbd>
<kbd><i class="bi bi-arrow-right"></i></kbd>
</div>

</div>


<span class="lead px-2">选择，</span>


<kbd>Enter</kbd>

<span class="lead px-2">键确认</span>


</div>


</div>



<script>


const platforms=[

{
name:"抖音",
url:"https://creator.douyin.com/",
icon:"/assets/image/douyin.svg"
},

{
name:"快手",
url:"https://cp.kuaishou.com/",
icon:"/assets/image/kuaishou.svg"
},

{
name:"小红书",
url:"https://creator.xiaohongshu.com/",
icon:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAM0AAABgCAYAAAC+PvZZAAAACXBIWXMAACE4AAAhOAFFljFgAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAA0KSURBVHgB7Z1LbFTXGce/cz1UlRKc6SqRghRLmAq6Cd0EKa2UwZC2uwRYFhV7SwWEVApSUxW7UqTSRXlYTdVsakdtd7y6ahMeU6lZkE1gA6iA4kog0Z1rg1SBZ07P/94Zezy+j+8+z70z3w+ZGY+vZ65n7v98z3OO..."
},

{
name:"微信视频号",
url:"https://channels.weixin.qq.com/",
icon:"/assets/image/shipinhao.svg"
},

{
name:"Bilibili",
url:"https://member.bilibili.com/",
icon:"/assets/image/bilibili.svg"
}

]


const container=document.getElementById("member")


platforms.forEach(p=>{

container.insertAdjacentHTML("beforeend",

`<div class="box">

<div class="d-flex align-items-center">

<img src="${p.icon}" class="me-3">

<div>

<a class="icon-link icon-link-hover link-body-emphasis" href="${p.url}" target="_blank">

<strong>${p.name}</strong>
<small class="ms-2">创作者中心</small>

<i class="bi bi-box-arrow-up-right"></i>

</a>

</div>

</div>

</div>`

)

})



const items=document.querySelectorAll(".box")

let index=0



function select(i){

items.forEach(el=>el.classList.remove("active"))

items[i].classList.add("active")

items[i].querySelector("a").focus()

}


select(index)



window.addEventListener("keydown",e=>{

const cols=Math.floor(container.offsetWidth/items[0].offsetWidth)

switch(e.key){

case "ArrowRight":
index=(index+1)%items.length
break

case "ArrowLeft":
index=(index-1+items.length)%items.length
break

case "ArrowDown":
index=(index+cols)%items.length
break

case "ArrowUp":
index=(index-cols+items.length)%items.length
break

case "Enter":
items[index].querySelector("a").click()
return

default:
return

}

select(index)

})


</script>



</body>
</html>
