<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>短视频平台创作者中心导航</title>

<link rel="stylesheet" href="https://cdn.anssl.cn/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.anssl.cn/bootstrap-icons/font/bootstrap-icons.min.css">

<style>

body{
background:#f8f9fa;
}

#member{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:2rem;
}

.box{
cursor:pointer;
padding:1rem;
border-radius:10px;
background:white;
border:1px solid #eee;
transition:.2s;
}

.box:hover{
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.box.active{
background:#198754;
color:white;
box-shadow:0 6px 14px rgba(0,0,0,.15);
}

.box.active a{
color:white;
}

.box img{
height:3rem;
}

a{
text-decoration:none;
}

a:focus{
outline:none;
}

.shortcut{
text-align:center;
margin-top:60px;
color:#666;
font-size:14px;
}

kbd{
background:#f1f3f5;
border:1px solid #ddd;
border-radius:6px;
padding:4px 8px;
font-size:12px;
}

</style>

</head>


<body>

<div class="container py-5">

<h3 class="text-center mb-5">短视频平台创作者中心导航</h3>

<div id="member"></div>

<div class="shortcut">
使用
<kbd>↑</kbd>
<kbd>↓</kbd>
<kbd>←</kbd>
<kbd>→</kbd>
选择平台，
<kbd>Enter</kbd>
打开
</div>

</div>


<script>

const platforms = [

{
name:"抖音",
url:"https://creator.douyin.com/",
icon:"/assets/image/douyin.svg"
},

{
name:"快手",
url:"https://cp.kuaishou.com/",
icon:"/assets/image/kuaishou.svg"
},

{
name:"小红书",
url:"https://creator.xiaohongshu.com/",
icon:"/assets/image/xiaohongshu.svg"
},

{
name:"微信视频号",
url:"https://channels.weixin.qq.com/",
icon:"/assets/image/shipinhao.svg"
},

{
name:"Bilibili",
url:"https://member.bilibili.com/",
icon:"/assets/image/bilibili.svg"
}

]


const container = document.getElementById("member")


platforms.forEach(p=>{

container.insertAdjacentHTML("beforeend",

`
<div class="box">

<div class="d-flex align-items-center">

<img src="${p.icon}" class="me-3">

<div>

<a href="${p.url}" target="_blank">
<strong>${p.name}</strong>
<small class="ms-2">创作者中心</small>
</a>

</div>

</div>

</div>
`

)

})


const items = document.querySelectorAll(".box")

let index = 0


function select(i){

items.forEach(el=>el.classList.remove("active"))

items[i].classList.add("active")

items[i].querySelector("a").focus()

}


select(index)


window.addEventListener("keydown",e=>{

const cols = Math.floor(container.offsetWidth / items[0].offsetWidth)

switch(e.key){

case "ArrowRight":
index = (index + 1) % items.length
break

case "ArrowLeft":
index = (index - 1 + items.length) % items.length
break

case "ArrowDown":
index = (index + cols) % items.length
break

case "ArrowUp":
index = (index - cols + items.length) % items.length
break

case "Enter":
items[index].querySelector("a").click()
return

default:
return

}

select(index)

})

</script>

</body>
</html>
