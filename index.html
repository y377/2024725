<body>
  <div class="container py-5">
    <h3 class="text-center mb-5">短视频平台创作者中心导航</h3>

    <!-- 用 Bootstrap 栅格，不写 CSS -->
    <div id="member" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4"></div>

    <!-- 键盘提示：布局按我的（居中），颜色保持 bootstrap 默认 -->

      <span class="lead px-2">键盘</span>

      <span class="d-inline-flex flex-column align-items-center mx-2">
        <span><kbd><i class="bi bi-arrow-up"></i></kbd></span>
        <span class="pt-1">
          <kbd><i class="bi bi-arrow-left"></i></kbd>
          <kbd><i class="bi bi-arrow-down"></i></kbd>
          <kbd><i class="bi bi-arrow-right"></i></kbd>
        </span>
      </span>

      <span class="lead px-2">选择，</span>
      <kbd>Enter</kbd>
      <span class="lead px-2">键确认</span>
    </div>
  </div>

      },
      { name: "微信", url: "https://channels.weixin.qq.com/", icon: "/assets/image/shipinhao.svg" },
      { name: "bilibili", url: "https://member.bilibili.com/", icon: "/assets/image/bilibili.svg" }
    ];

    const member = document.getElementById("member");

    // 渲染：icon-link + stretched-link，整个卡片可点
    platforms.forEach(p => {
      member.insertAdjacentHTML("beforeend", `
        <div class="col">
          <div class="box p-3 rounded border bg-white d-flex align-items-center gap-3 h-100 position-relative"
               tabindex="0" role="link" data-href="${p.url}">
            <img src="${p.icon}" alt="${p.name} logo" style="height:3rem" class="flex-shrink-0" />
            <div class="min-w-0">
              <a class="icon-link icon-link-hover link-body-emphasis stretched-link"
                 href="${p.url}" target="_blank" rel="noopener">
                <span class="fw-bold">${p.name}</span>
                <small class="ms-2">创作者中心</small>
                <i class="bi bi-box-arrow-up-right"></i>
              </a>
            </div>
          </div>
        </div>
      `);
    });

    const boxes = Array.from(document.querySelectorAll(".box"));
    let currentIndex = 0;

    function setSelected(idx){
      boxes.forEach((box, i) => {
        const a = box.querySelector("a");
        // 选中态：全部用 bootstrap 类，不写 CSS
        if(i === idx){
          box.classList.add("text-bg-success","shadow","border-0");
          box.classList.remove("bg-white","border");
          // link 颜色也用 bootstrap 类切换
          a.classList.add("link-light");
          a.classList.remove("link-body-emphasis");
        }else{
          box.classList.remove("text-bg-success","shadow","border-0");
          box.classList.add("bg-white","border");
          a.classList.add("link-body-emphasis");
          a.classList.remove("link-light");
        }
      });

      // 焦点落在容器上（不是 a）
      boxes[idx].focus({ preventScroll: true });
      boxes[idx].scrollIntoView({ block: "nearest", inline: "nearest" });
    }

    setSelected(currentIndex);

    // 点击卡片也能打开
    boxes.forEach((box) => {
      box.addEventListener("click", (e) => {
        // 点击链接本身就交给默认行为；点击卡片空白区则打开
        const href = box.dataset.href;
        if(href && !e.target.closest("a")){
          window.open(href, "_blank", "noopener");
        }
      });
    });

    function getCols(){
      const first = boxes[0];
      if(!first) return 1;
      const memberRect = member.getBoundingClientRect();
      const cardRect = first.getBoundingClientRect();
      return Math.max(1, Math.round(memberRect.width / cardRect.width));
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key;
      if(!["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Enter"].includes(key)) return;

      e.preventDefault();

      const cols = getCols();

      switch(key){
        case "ArrowRight":
          currentIndex = (currentIndex + 1) % boxes.length;
          break;
        case "ArrowLeft":
          currentIndex = (currentIndex - 1 + boxes.length) % boxes.length;
          break;
        case "ArrowDown":
          currentIndex = (currentIndex + cols) % boxes.length;
          break;
        case "ArrowUp":
          currentIndex = (currentIndex - cols + boxes.length) % boxes.length;
          break;
        case "Enter": {
          const href = boxes[currentIndex].dataset.href;
          if(href) window.open(href, "_blank", "noopener");
          return;
        }
      }

      setSelected(currentIndex);
    });
  </script>
