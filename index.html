  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>短视频平台创作者中心导航</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="https://cdn.anssl.cn/bootstrap/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.anssl.cn/bootstrap-icons/font/bootstrap-icons.min.css" crossorigin="anonymous" />

  <style>
    #member{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:2rem;
    }
    .box{
      cursor:pointer;
      transition:.15s;
    }
    .box:hover{
      transform:translateY(-2px);
    }
    .box.active{
      background:#198754;
      color:#fff;
      border-color:transparent !important;
      box-shadow:0 .5rem 1rem rgba(0,0,0,.15);
    }
    .box.active a{
      color:#fff !important;
    }
    /* 不自定义 a / kbd 颜色；只处理可访问性聚焦轮廓 */
    a:focus{ outline:none; box-shadow:none; }
  </style>
</head>

<body>

  <div class="container py-5">
    <h3 class="text-center mb-5">短视频平台创作者中心导航</h3>

    <div id="member"></div>

    <!-- 键盘提示：布局按优化版；颜色保持 bootstrap 默认 -->
    <div class="text-center pt-5 mb-3">
      <span class="lead px-2">键盘</span>

      <div class="d-inline-flex flex-column align-items-center mx-2">
        <div><kbd><i class="bi bi-arrow-up"></i></kbd></div>
        <div class="pt-1">
          <kbd><i class="bi bi-arrow-left"></i></kbd>
          <kbd><i class="bi bi-arrow-down"></i></kbd>
          <kbd><i class="bi bi-arrow-right"></i></kbd>
        </div>
      </div>

      <span class="lead px-2">选择，</span>
      <kbd>Enter</kbd>
      <span class="lead px-2">键确认</span>
    </div>
  </div>

      { name:"bilibili", url:"https://member.bilibili.com/", icon:"/assets/image/bilibili.svg" }
    ];

    const container = document.getElementById("member");

    platforms.forEach(p => {
      container.insertAdjacentHTML("beforeend", `
        <div class="box rounded p-3 bg-white border">
          <div class="d-flex align-items-center">
            <img src="${p.icon}" class="img-fluid px-2" alt="${p.name} logo" style="height:3rem" />
            <div class="ms-3">
              <a class="icon-link icon-link-hover link-body-emphasis" href="${p.url}" target="_blank" rel="noopener">
                <span class="fw-bold">${p.name}</span>
                <span class="ms-2">创作者中心</span>
                <i class="bi bi-box-arrow-up-right"></i>
              </a>
            </div>
          </div>
        </div>
      `);
    });

    const items = document.querySelectorAll(".box");
    let index = 0;

    function select(i){
      items.forEach(el => el.classList.remove("active"));
      items[i].classList.add("active");
      const link = items[i].querySelector("a");
      if(link) link.focus();
    }

    select(index);

    window.addEventListener("keydown", (e) => {
      const first = items[0];
      if(!first) return;

      // 估算列数：容器宽度 / 卡片宽度（包含 gap 的近似）
      const cardWidth = first.getBoundingClientRect().width;
      const cols = Math.max(1, Math.round(container.getBoundingClientRect().width / cardWidth));

      switch(e.key){
        case "ArrowRight":
          index = (index + 1) % items.length;
          break;
        case "ArrowLeft":
          index = (index - 1 + items.length) % items.length;
          break;
        case "ArrowDown":
          index = (index + cols) % items.length;
          break;
        case "ArrowUp":
          index = (index - cols + items.length) % items.length;
          break;
        case "Enter":
          items[index].querySelector("a")?.click();
          return;
        default:
          return;
      }
      select(index);
    });
  </script>
